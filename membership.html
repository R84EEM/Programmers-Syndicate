<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العضوية | نقابة المبرمجين العراقيين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-orange: #ff8c00;
            --navy-deep: #000814;
            --navy-light: #001d3d;
            --glow: rgba(255, 140, 0, 0.4);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; margin: 0; padding: 0; }

        body, html {
            height: 100vh; overflow: hidden;
            font-family: 'Cairo', sans-serif; 
            /* خلفية نيلي متدرج فقط بدون مربعات */
            background: radial-gradient(circle at center, var(--navy-light) 0%, var(--navy-deep) 100%);
            color: #fff;
        }

        .wrapper {
            display: flex; flex-direction: column; height: 100vh;
            position: relative;
        }

        /* الهيدر */
        header {
            background-color: rgba(0, 8, 20, 0.9); backdrop-filter: blur(15px);
            padding: 0 4%; height: 12vh; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(255, 140, 0, 0.2); z-index: 1000;
        }

        .logo-container { display: flex; align-items: center; text-decoration: none; gap: 12px; }
        .logo-img { height: 6.5vh; width: auto; filter: drop-shadow(0 0 8px var(--glow)); }
        .logo-text { font-size: 1.1rem; font-weight: 900; color: white; line-height: 1.2; }
        .logo-text span { color: var(--accent-orange); }

        nav { display: flex; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 18px; font-weight: 600; font-size: 0.8rem; white-space: nowrap; }
        nav a:hover { color: var(--accent-orange); }
        .nav-contact { border: 1px solid var(--accent-orange); padding: 5px 15px; border-radius: 50px; background: rgba(255, 140, 0, 0.1); }

        /* محتوى العضوية */
        .main-content {
            flex-grow: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 0 5%;
        }

        .membership-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 140, 0, 0.2);
            padding: 40px;
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .membership-card h2 { font-size: 2rem; margin-bottom: 10px; color: var(--accent-orange); }
        .membership-card p { color: #cbd5e0; margin-bottom: 30px; font-size: 0.95rem; }

        .form-group { text-align: right; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.85rem; color: var(--accent-orange); }
        .form-group input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2); color: #fff; outline: none; font-family: 'Cairo';
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--accent-orange), #ffae42);
            color: white; width: 100%; padding: 12px; border-radius: 10px;
            border: none; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            margin-top: 10px;
        }

        /* التذييل */
        footer {
            height: 8vh; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 8, 20, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.8rem;
        }
        .designer-info span { color: var(--accent-orange); font-weight: bold; }

    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <a href="index.html" class="logo-container">
                <img src="logo1.jpeg" alt="لوجو" class="logo-img">
                <div class="logo-text">نقابة <span>المبرمجين</span><br>العراقيين</div>
            </a>
            <nav>
                <a href="index.html">الرئيسية</a>
                <a href="projects.html">المشاريع</a>
                <a href="community.html">المجتمع</a>
                <a href="initiatives.html">المبادرات</a>
                <a href="creators.html">سجل المبتكرين</a>
                <a href="support.html">الدعم</a>
                <a href="contact.html">اتصل بنا</a>
                <a href="membership.html" class="nav-contact">بوابة العضوية</a>
            </nav>
        </header>

        <main class="main-content">
            <div class="membership-card">
                <h2>بوابة العضوية</h2>
                <p>سجل بياناتك للانضمام إلى النخبة البرمجية في العراق.</p>
                
                <form>
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" placeholder="أدخل اسمك الثلاثي">
                    </div>
                    <div class="form-group">
                        <label>التخصص البرمجي</label>
                        <input type="text" placeholder="مثال: مطور ويب، مهندس AI">
                    </div>
                    <button type="submit" class="btn-submit">إرسال الطلب</button>
                </form>
            </div>
        </main>

        <footer>
            <div class="designer-info">
                تطوير ونمذجة المهندسة <span>م.د. ريم محمد خضير</span> | دكتوراه تكنولوجيا المعلومات &copy; 2026
            </div>
        </footer>
    </div>

</body>
</html>
